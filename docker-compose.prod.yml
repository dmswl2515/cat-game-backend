services:
  postgres:
    image: postgres:16-alpine
    container_name: cat-game-db-prod
    environment:
      POSTGRES_DB: catgame
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - cat-game-data-prod:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d catgame"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/cat-game-backend}:latest
    container_name: cat-game-app
    ports:
      - "80:8567"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          memory: 4g
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cat-game-data-prod:
