version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cat-game-db
    environment:
      POSTGRES_DB: catgame
      POSTGRES_USER: catgame
      POSTGRES_PASSWORD: catgame1234
    ports:
      - "5433:5432"
    volumes:
      - cat-game-data:/var/lib/postgresql/data

volumes:
  cat-game-data:
